<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <title>WMF to SVG</title>
  <style>
    .uploader {
      background: #8e8e8e;
      height: 200px;
      overflow: hidden;
      position: relative;
      width: 100%;
    }

    .uploader:before {
      align-items: center;
      border: dashed 2px #ffffff;
      bottom: 24px;
      color: #ffffff;
      content: 'drag and drop your file here';
      display: flex;
      font-size: 20px;
      justify-content: center;
      left: 24px;
      pointer-events: none;
      position: absolute;
      right: 24px;
      top: 24px;
    }

    .uploader input {
      display: block;
      height: 100%;
      left: 0;
      opacity: 0;
      position: absolute;
      top: 0;
      width: 100%;
    }

    .result {
      border: solid black;
      margin-top: 10px;
      padding: 10px;
    }

    .result h3 {
      margin: 0 0 10px;
    }

    .scroll-top {
      background: #333333;
      border: none;
      border-radius: 50%;
      bottom: 24px;
      color: #ffffff;
      cursor: pointer;
      display: none;
      font-size: 18px;
      height: 72px;
      position: fixed;
      right: 24px;
      width: 72px;
    }

    .scroll-top.visible {
      display: block;
    }
  </style>
</head>

<body>
  <h1>WMF to SVG</h1>

  <h2>WMF File:</h2>
  <div class="uploader">
    <input id="input" type="file" accept=".wmf" multiple />
  </div>

  <h2>SVG Output: <span id="summary"></span></h2>
  <div id="output"></div>

  <button id="scroll-top" class="scroll-top" type="button">Top</button>

  <script type="module">
    import init, { convertWmf2Svg, setLogLevel } from "./wmf_wasm.js";

    function readFile(file) {
      return new Promise((resolve, reject) => {
        const fileReader = new FileReader();
        fileReader.onload = (e) => resolve(new Uint8Array(e.target.result));
        fileReader.onerror = () => reject(fileReader.error);
        fileReader.readAsArrayBuffer(file);
      });
    }

    async function handleFile(file) {
      const section = document.createElement("section");
      section.className = "result";

      const heading = document.createElement("h3");
      const body = document.createElement("div");
      section.append(heading, body);
      document.getElementById("output").append(section);

      const start = Date.now();
      try {
        const bytes = await readFile(file);
        body.innerHTML = convertWmf2Svg(bytes);
      } catch (e) {
        body.innerText = `${e}`;
      }
      heading.innerText = `${file.name} / ${Date.now() - start}ms`;
    }

    async function handleFiles(fileList) {
      const files = Array.from(fileList ?? []);
      if (files.length === 0) {
        return;
      }

      const output = document.getElementById("output");
      const summary = document.getElementById("summary");
      output.innerHTML = "";
      summary.innerText = "";

      const start = Date.now();
      for (const file of files) {
        await handleFile(file);
      }
      summary.innerText = `${files.length} file(s) / ${Date.now() - start}ms`;
    }

    async function run() {
      await init();
      setLogLevel("info");

      const input = document.getElementById("input");
      const uploader = document.querySelector(".uploader");

      input.addEventListener("change", () => {
        handleFiles(input.files);
      });

      uploader.addEventListener("dragover", (e) => {
        e.preventDefault();
      });

      uploader.addEventListener("drop", (e) => {
        e.preventDefault();
        handleFiles(e.dataTransfer.files);
      });

      const scrollTop = document.getElementById("scroll-top");
      scrollTop.addEventListener("click", () => {
        window.scrollTo({ top: 0, behavior: "instant" });
      });
      const updateScrollTop = () => {
        const visible = uploader.getBoundingClientRect().bottom < 0;
        scrollTop.classList.toggle("visible", visible);
      };
      window.addEventListener("scroll", updateScrollTop, { passive: true });
      updateScrollTop();
    }

    run();
  </script>
</body>

</html>
